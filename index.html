    max-width: 90vw;
    text-align: center;

    margin-bottom: 16px;

    font-size: 18px;

  }

    display: inline-block;
    background: #fff3cd;
    color: #856404;
    border: 1px solid #ffc107;
    border-radius: 4px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 24px;
  }
  #password-input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #dce3ed;
    border-radius: 8px;
    font-size: 15px;
    letter-spacing: 2px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  #password-input:focus { border-color: #1a3a5c; }
  #password-input.error { border-color: #c0392b; animation: shake 0.3s; }

    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  #submit-btn {
    width: 100%;
    margin-top: 14px;
    padding: 13px;
    background: #1a3a5c;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  #submit-btn:hover { background: #243f6e; }
  #error-msg {
    margin-top: 12px;
    font-size: 13px;
    color: #c0392b;
    min-height: 18px;
  }
  .footer-note {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid #eef0f3;
    font-size: 11px;
    color: #aab2bc;
    line-height: 1.7;
  }
  #report-frame {
    display: none;
    width: 100%;
    height: 100vh;
    border: none;
    position: fixed;
    top: 0; left: 0;
    z-index: 9999;
    background: #fff;
  }

async function sha256(str) {
  const buf = new TextEncoder().encode(str);
  const hashBuf = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hashBuf))
    .map(b => b.toString(16).padStart(2,'0')).join('');
}

function base64ToBlob(b64, type) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type });
}

async function verify() {
  const pwd = document.getElementById('password-input').value;
  const input = document.getElementById('password-input');
  const errMsg = document.getElementById('error-msg');

  if (!pwd) {
    errMsg.textContent = '请输入密码';
    return;
  }

  const h = await sha256(pwd);
  if (h === HASH) {
    // 解锁成功：将 base64 解码后塞入 iframe
    errMsg.textContent = '';
    document.getElementById('submit-btn').textContent = '正在加载报告…';
    document.getElementById('submit-btn').disabled = true;

    const blob = base64ToBlob(DATA, 'text/html;charset=utf-8');
    const url = URL.createObjectURL(blob);
    const frame = document.getElementById('report-frame');
    frame.src = url;
    frame.style.display = 'block';
    document.getElementById('lock-screen').style.display = 'none';
    document.body.style.background = '#fff';
  } else {
    input.classList.add('error');
    errMsg.textContent = '密码错误，请重新输入';
    input.value = '';
    setTimeout(() => input.classList.remove('error'), 400);
  }
}

document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') verify();
});
